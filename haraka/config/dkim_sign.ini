# DKIM Signing Configuration
# Generated: 2024

# Domain to sign
domain=protechplanner.com

# Selector name
selector=default

# Private key path
private_key=/opt/haraka/dkim.private

# Headers to sign
headers=from,to,subject,date,message-id

# Algorithm (rsa-sha256 recommended)
algorithm=rsa-sha256

# Canonicalization (relaxed/relaxed is recommended)
canonicalization=relaxed/relaxed

# Body length limit
# bodylength=10000

# Sign all messages
enabled=true
