version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - EMAIL_HOST=mail.protechplanner.com
      - EMAIL_PORT=587
      - EMAIL_USER=info@protechplanner.com
      - EMAIL_PASS=${EMAIL_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - EMAIL_HOST=mail.protechplanner.com
      - EMAIL_PORT=587
      - EMAIL_USER=info@protechplanner.com
      - EMAIL_PASS=${EMAIL_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  redis_data: