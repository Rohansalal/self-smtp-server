version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - email-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - EMAIL_HOST=mail.protechplanner.com
      - EMAIL_PORT=587
      - EMAIL_USER=info@protechplanner.com
      - EMAIL_PASS=${EMAIL_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HARAKA_SERVER=haraka
      - HARAKA_PORT=25
      - BACKEND_URL=http://backend:3000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    depends_on:
      - redis
      - haraka
    networks:
      - email-network

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - EMAIL_HOST=haraka
      - EMAIL_PORT=587
      - EMAIL_USER=info@protechplanner.com
      - EMAIL_PASS=${EMAIL_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HARAKA_HOST=haraka
      - HARAKA_PORT=25
    depends_on:
      - redis
      - haraka
    networks:
      - email-network

  haraka:
    image: haraka/haraka:latest
    container_name: haraka-smtp
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    volumes:
      - ./haraka/config:/opt/haraka/config
      - ./haraka/plugins:/opt/haraka/plugins
      - haraka_data:/opt/haraka
    environment:
      - HOSTNAME=mail.protechplanner.com
      - HARAKA_PLUGIN_PATH=/opt/haraka/plugins
    networks:
      - email-network
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - email-network

volumes:
  redis_data:
  haraka_data:

networks:
  email-network:
    driver: bridge
